<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tempsens Configurator</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>

<body>

<div class="container">

  <h1> Tempsens Configurator</h1>

  <div class="layout">

    <!-- LEFT PANEL -->
    <div class="panel">
      <h3>Configuration</h3>

      <label>Length (mm)</label>
      <input type="number" value="300" id="lengthInput" />

      <label>Diameter (mm)</label>
      <select id="diameterInput">
        <option value="4">4</option>
        <option value="6" selected>6</option>
        <option value="8">8</option>
      </select>

      <button onclick="updateModel()">Update Model</button>
    </div>

    <!-- CENTER VIEWER -->
    <div class="viewer">
      <h3>3D Model</h3>
      <div id="canvas-container"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
      <h3>Output</h3>
      <p><strong>Model Code:</strong></p>
      <p id="modelCode" class="code">TC-K-SS316</p>
    </div>

  </div>
</div>

<!-- 3D SCRIPT -->
<script>

let scene, camera, renderer, sheath;

// INIT
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, 600/400, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(600, 400);

  document.getElementById("canvas-container").appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light);

  createModel(300, 6);

  animate();
}

// CREATE MODEL
function createModel(lengthMM, diameterMM) {

  if (sheath) {
    scene.remove(sheath);
  }

  const length = lengthMM / 100;   // scale
  const radius = diameterMM / 200;

  const geometry = new THREE.CylinderGeometry(radius, radius, length, 32);
  const material = new THREE.MeshStandardMaterial({ color: 0x888888 });

  sheath = new THREE.Mesh(geometry, material);
  scene.add(sheath);
}

// UPDATE MODEL FROM INPUT
function updateModel() {
  const length = document.getElementById("lengthInput").value;
  const diameter = document.getElementById("diameterInput").value;

  createModel(length, diameter);

  document.getElementById("modelCode").innerText =
    `TC-K-SS316-${diameter}mm-${length}mm`;
}

// ANIMATION LOOP
function animate() {
  requestAnimationFrame(animate);

  if (sheath) {
    sheath.rotation.y += 0.01;
  }

  renderer.render(scene, camera);
}

// START
init();

</script>

</body>
</html>
